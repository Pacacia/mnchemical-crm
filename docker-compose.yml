services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mnchemical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src/api
    ports:
      - "8080:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=mnchemical;Username=postgres;Password=postgres
      - FrontendUrl=http://localhost:4000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./src/web
    ports:
      - "4000:80"
    depends_on:
      - api

volumes:
  pgdata:
